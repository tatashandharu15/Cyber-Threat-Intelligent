# HorizontalPodAutoscalers for API-general workloads (Infra Blueprint 3.4):
# CPU target 70%, min 2 / max 10. Covers auth, the 5 detection services
# (DLM/CLM/DWM/BRM/PHM) and the alert-engine. Collection workers additionally
# scale on Kafka lag via KEDA in production (out of scope for this foundation).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service
  labels:
    app: auth-service
    app.kubernetes.io/part-of: cti-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
