# notification-service — port 8091. Node group: api (Infra Blueprint 3.2).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
    app.kubernetes.io/part-of: cti-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        # Prometheus scrapes /metrics on the HTTP port (packages/utils/server
        # registers /healthz, /ready and /metrics on the same listener).
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8091"
    spec:
      # Schedule onto the blueprint node group via the role label.
      nodeSelector:
        role: api
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: notification-service
          image: cti-notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8091
          env:
            - name: ENV
              valueFrom:
                configMapKeyRef:
                  name: cti-config
                  key: ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: cti-config
                  key: LOG_LEVEL
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: cti-config
                  key: KAFKA_BROKERS
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: cti-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: JWT_ALG
              valueFrom:
                configMapKeyRef:
                  name: cti-config
                  key: JWT_ALG
            - name: HTTP_PORT
              value: "8091"
            - name: OTEL_SERVICE_NAME
              value: "notification-service"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cti-secrets
                  key: DATABASE_URL
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: cti-secrets
                  key: JWT_PUBLIC_KEY
            - name: AUDIT_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: cti-secrets
                  key: AUDIT_HMAC_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  labels:
    app: notification-service
    app.kubernetes.io/part-of: cti-platform
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8091
      targetPort: http
