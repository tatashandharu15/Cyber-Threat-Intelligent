# =============================================================================
# EXAMPLE Secret — DO NOT COMMIT REAL VALUES, DO NOT APPLY AS-IS IN PRODUCTION.
# =============================================================================
# This is a TEMPLATE only. Placeholder values below are obvious non-secrets so a
# `kubectl apply -k` of the staging overlay produces a syntactically valid (but
# functionally insecure) Secret for local/dry-run validation.
#
# Real secrets MUST be delivered by one of:
#   - HashiCorp Vault + Vault Agent / VSO (Infra Blueprint section 6), or
#   - Bitnami SealedSecrets / SOPS committed encrypted, decrypted in-cluster.
#
# DATABASE_URL  — staging points at a SINGLE Postgres/Aurora holding every schema
#                 (core_platform, monitoring, platform_svc); prod uses 3 clusters.
# JWT_PRIVATE_KEY — RS256 signing key; ONLY the auth-service should receive it.
# JWT_PUBLIC_KEY  — RS256 verification key; every service receives it.
# AUDIT_HMAC_KEY  — tamper-evident audit log HMAC key (audit-service + producers).
apiVersion: v1
kind: Secret
metadata:
  name: cti-secrets
  labels:
    app.kubernetes.io/part-of: cti-platform
type: Opaque
stringData:
  # postgres://<user>:<password>@<host>:5432/<db>?sslmode=require
  DATABASE_URL: "REPLACE_ME_postgres://cti:REPLACE_ME@cti-postgres:5432/cti?sslmode=disable"
  # PEM-encoded RS256 keypair. Replace with real key material via Vault/SealedSecrets.
  JWT_PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_ME_RS256_PRIVATE_KEY
    -----END PRIVATE KEY-----
  JWT_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_ME_RS256_PUBLIC_KEY
    -----END PUBLIC KEY-----
  AUDIT_HMAC_KEY: "REPLACE_ME_audit_hmac_key_32_bytes_min"
