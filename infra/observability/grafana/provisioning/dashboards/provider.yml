# Grafana dashboard provisioning: load all dashboard JSON from disk.
# The dashboard JSON files (cti-operations.json, platform-overview.json,
# service-health.json) are authored by another agent and mounted at
# /var/lib/grafana/dashboards by docker-compose.prod.yml.
apiVersion: 1

providers:
  - name: cti-dashboards
    orgId: 1
    folder: CTI
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
