# Kong declarative (DB-less) configuration for the docker-compose staging stack.
#
# This is a copy of kong.yml with the upstream hosts rewritten from
# `host.docker.internal:<port>` to the docker-compose service DNS names so Kong
# reaches the services over the shared `cti` network instead of the host.
# Keep this file in sync with kong.yml when routes change.
#
# Mounted by docker-compose.prod.yml at /kong/kong.yml.
_format_version: "3.0"
_transform: true

services:
  # Auth is public (login/refresh issue tokens); no JWT plugin here.
  - name: auth-service
    url: http://auth-service:8081
    routes:
      - name: auth-routes
        paths: ["/v1/auth"]
        strip_path: false

  - name: user-service
    url: http://user-service:8082
    routes:
      - name: user-routes
        paths: ["/v1/users"]
        strip_path: false
    plugins:
      - name: jwt

  - name: asset-service
    url: http://asset-service:8083
    routes:
      - name: asset-routes
        paths: ["/v1/assets"]
        strip_path: false
    plugins:
      - name: jwt

  - name: alert-engine
    url: http://alert-engine:8084
    routes:
      - name: alert-routes
        paths: ["/v1/alerts", "/v1/alert-rules"]
        strip_path: false
    plugins:
      - name: jwt

  - name: dlm-service
    url: http://dlm-service:8085
    routes:
      - name: dlm-routes
        paths: ["/v1/dlm"]
        strip_path: false
    plugins:
      - name: jwt

  - name: clm-service
    url: http://clm-service:8086
    routes:
      - name: clm-routes
        paths: ["/v1/clm"]
        strip_path: false
    plugins:
      - name: jwt

  - name: dwm-service
    url: http://dwm-service:8087
    routes:
      - name: dwm-routes
        paths: ["/v1/dwm"]
        strip_path: false
    plugins:
      - name: jwt

  - name: brm-service
    url: http://brm-service:8088
    routes:
      - name: brm-routes
        paths: ["/v1/brm"]
        strip_path: false
    plugins:
      - name: jwt

  - name: phm-service
    url: http://phm-service:8089
    routes:
      - name: phm-routes
        paths: ["/v1/phm"]
        strip_path: false
    plugins:
      - name: jwt

  - name: investigation-service
    url: http://investigation-service:8090
    routes:
      - name: investigation-routes
        paths: ["/v1/investigations"]
        strip_path: false
    plugins:
      - name: jwt

  - name: notification-service
    url: http://notification-service:8091
    routes:
      - name: notification-routes
        paths: ["/v1/notifications", "/v1/notification-preferences"]
        strip_path: false
    plugins:
      - name: jwt

  - name: audit-service
    url: http://audit-service:8092
    routes:
      - name: audit-routes
        paths: ["/v1/audit-logs"]
        strip_path: false
    plugins:
      - name: jwt

  - name: indicator-service
    url: http://indicator-service:8093
    routes:
      - name: indicator-routes
        paths: ["/v1/indicators"]
        strip_path: false
    plugins:
      - name: jwt

  - name: takedown-service
    url: http://takedown-service:8094
    routes:
      - name: takedown-routes
        paths: ["/v1/takedowns"]
        strip_path: false
    plugins:
      - name: jwt

# Global plugins applied to every route.
plugins:
  # Generate/propagate X-Request-ID for tracing (API Blueprint 4.2).
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true

  # Per-consumer (per-tenant via JWT) sliding-window rate limiting.
  - name: rate-limiting
    config:
      minute: 1000
      policy: local
      hide_client_headers: false

# JWT credentials are provisioned per tenant/consumer at deploy time. The HS256
# secret here must match each service's JWT_SECRET. Services independently verify
# the JWT as defense-in-depth, so a gateway bypass still cannot reach data.
consumers:
  - username: platform
    jwt_secrets:
      - algorithm: HS256
        key: siberindo-cti
        secret: dev-insecure-jwt-secret-change-me
